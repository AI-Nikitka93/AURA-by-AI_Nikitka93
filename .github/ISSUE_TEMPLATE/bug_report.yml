name: Bug report
description: Report a broken section, layout issue, or deployment problem.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a problem.
  - type: input
    id: page
    attributes:
      label: Page or route
      placeholder: / or /privacy.html
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and device
      placeholder: Chrome 123 on Windows 11
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: 1. Open...
      render: markdown
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
  - type: textarea
    id: extras
    attributes:
      label: Screenshots or extra context
      render: markdown
